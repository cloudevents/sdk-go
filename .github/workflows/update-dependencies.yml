name: Update Dependencies

on:
  schedule:
    # Runs every Monday at 3:00 AM UTC
    - cron: '0 3 * * 1'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  update-dependencies:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25
          cache-dependency-path: v2/go.sum

      - name: Run update dependencies script
        run: |
          chmod +x ./hack/update-deps.sh
          ./hack/update-deps.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          base: main
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body: |
            This PR updates Go dependencies.
            
            This is an automated PR created by the weekly dependency update workflow.
          branch: automated-dependency-updates
          delete-branch: true
          labels: dependencies
          reviewers: sdk-go-maintainers
          signoff: true
          sign-commits: true
